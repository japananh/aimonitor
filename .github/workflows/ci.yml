name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.12.2

  swift:
    name: swift build (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: swift --version
        run: swift --version
      - name: swift build (release)
        working-directory: ui/macos
        run: swift build -c release
      - name: confirm LSUIElement embedded
        working-directory: ui/macos
        # otool -P dumps the __TEXT __info_plist section. Grep guard
        # keeps a silent regression from sneaking through if the
        # linker flag goes missing.
        run: |
          otool -P .build/release/AIMonitor | tee /tmp/info.plist
          grep -q 'LSUIElement' /tmp/info.plist
          grep -q '<true/>' /tmp/info.plist
