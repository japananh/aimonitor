name: 🐞 Bug report
description: Something in aimonitor isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! A few specifics up front make it far
        faster to fix. **Please don't paste raw tokens** — `aimonitor` redacts its own
        logs, but copy/paste from elsewhere might not.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before filing
      options:
        - label: I searched [existing issues](https://github.com/japananh/aimonitor/issues?q=is%3Aissue) and didn't find a duplicate.
          required: true
        - label: I'm on the latest release (`aimonitor update check`), or have noted my version below.
          required: true
        - label: Any logs/output I paste contain no OAuth tokens or other secrets.
          required: true

  - type: input
    id: version
    attributes:
      label: aimonitor version
      description: Output of `aimonitor version`.
      placeholder: "aimonitor 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Homebrew cask (japananh/tap)
        - Linux install.sh
        - go install
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - Menu-bar app / popover
        - Background daemon
        - CLI (add / switch / list / import / …)
        - Auto-swap
        - Usage bars
        - Self-update
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you saw, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …

  - type: textarea
    id: doctor
    attributes:
      label: "`aimonitor doctor` output"
      description: Helps pinpoint daemon / keychain / config issues. (Run it and paste the output.)
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Daemon logs live at `~/Library/Logs/aimonitor/` (macOS). The update helper logs to
        `~/Library/Logs/aimonitor/update.log`. Paste anything relevant — double-check for secrets first.
      render: text
