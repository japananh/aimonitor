name: 💡 Feature request
description: Suggest an idea or improvement for aimonitor
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before filing
      options:
        - label: I searched [existing issues](https://github.com/japananh/aimonitor/issues?q=is%3Aissue) and didn't find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The situation or pain point — not the solution yet. "I'm always doing X and wish Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Your proposed solution or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or how you work around this today.

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Mockups, links, related tools, or how often this bites you.
