<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- AIMonitor icon: usage gauge on a gear.
       Hand-built flat vectors (not a bitmap trace) so it stays crisp at
       16px favicon size and 1024px app-icon size alike. -->

  <!-- Gear: yellow disc + seven teeth across the lower hemisphere
       (the gauge band covers the top). -->
  <g fill="#FDBE2B">
    <circle cx="256" cy="272" r="205"/>
    <g id="tooth-row">
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(0 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(30 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(60 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(90 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(-30 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(-60 256 272)"/>
      <polygon points="226,457 286,457 276,510 236,510 226,457" transform="rotate(-90 256 272)"/>
    </g>
  </g>

  <!-- Dial face -->
  <circle cx="256" cy="272" r="148" fill="#FFFFFF"/>

  <!-- Gauge band: red / blue / green, 180°→0° over the top -->
  <path d="M 24 272 A 232 232 0 0 1 113.2 89.2 L 156.3 144.3 A 162 162 0 0 0 94 272 Z" fill="#F44336"/>
  <path d="M 113.2 89.2 A 232 232 0 0 1 398.8 89.2 L 355.7 144.3 A 162 162 0 0 0 156.3 144.3 Z" fill="#42A5F5"/>
  <path d="M 398.8 89.2 A 232 232 0 0 1 488 272 L 418 272 A 162 162 0 0 0 355.7 144.3 Z" fill="#4CAF50"/>

  <!-- Slate end caps under both ends of the band -->
  <g fill="#4E5D73">
    <rect x="16" y="266" width="88" height="36" rx="8"/>
    <rect x="408" y="266" width="88" height="36" rx="8"/>
  </g>

  <!-- Tick marks, radiating inward from the band -->
  <g stroke-width="11" stroke-linecap="round" fill="none">
    <g stroke="#D32F2F">
      <line x1="114.4" y1="219.2" x2="142.7" y2="229.8"/>
      <line x1="127.4" y1="187.7" x2="153.1" y2="204.6"/>
    </g>
    <g stroke="#1E6FD2">
      <line x1="187.9" y1="146.5" x2="201.5" y2="173.6"/>
      <line x1="222.3" y1="132.6" x2="229.0" y2="162.1"/>
      <line x1="259.9" y1="129.1" x2="259.1" y2="159.4"/>
      <line x1="297.1" y1="136.4" x2="288.9" y2="165.5"/>
    </g>
    <g stroke="#2F9E41">
      <line x1="384.6" y1="187.7" x2="358.9" y2="204.6"/>
      <line x1="397.6" y1="219.2" x2="369.3" y2="229.8"/>
    </g>
  </g>

  <!-- Blue bowl (lower half-disc), darker rim then lighter body -->
  <path d="M 164 290 A 92 92 0 0 0 348 290 Z" fill="#2B8BE0"/>
  <path d="M 168 288 A 88 88 0 0 0 344 288 Z" fill="#4FA8F4"/>

  <!-- Needle: slate kite pointing upper-left, with a lighter facet -->
  <polygon points="128.7,160.7 267.3,276.7 285.7,317.7 244.7,299.3" fill="#475A75"/>
  <polygon points="128.7,160.7 267.3,276.7 256,288" fill="#5D6C88"/>

  <!-- Red hub -->
  <circle cx="256" cy="288" r="30" fill="#F03E3E"/>
</svg>
