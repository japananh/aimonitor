# golangci-lint v2 configuration.
# Schema reference: https://golangci-lint.run/usage/configuration/
#
# We enable the v2 "standard" preset (errcheck, govet, ineffassign, staticcheck,
# unused) and a couple of safety-oriented extras. Anything beyond that is
# opt-in per file via //nolint:<name> with a justification comment.

version: "2"

linters:
  default: standard
  enable:
    - bodyclose       # ensure http.Response.Body is closed
    - errorlint       # idiomatic errors.Is / errors.As wrapping checks
    - misspell        # commonly misspelled words
    - revive          # successor to golint, mild style rules
  settings:
    errcheck:
      # The fmt.Fp* family writes to stdout/stderr in the CLI, where the
      # writer effectively never errors (a closed pipe is the only case
      # and we can't recover usefully anyway). Checking each call clutters
      # user-facing output code. We intentionally do NOT exclude io.Writer.Write
      # broadly — that would mask real bugs in non-stdio writers.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        # Close() on a defer is the conventional Go idiom; its error on a
        # resource we're done with isn't actionable. errcheck matches by
        # concrete receiver type (not the io.Closer interface), so list each
        # type we `defer x.Close()` on. Lets us write a plain `defer x.Close()`
        # instead of wrapping every one in a closure. (bodyclose still enforces
        # that resp.Body IS closed.)
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*github.com/japananh/aimonitor/internal/store.Store).Close
  exclusions:
    rules:
      # Cobra RunE handlers take (cmd, args) by signature even when neither
      # is used, and provider stub methods carry ctx that will be used once
      # the real implementation lands. Renaming to `_` everywhere would just
      # be churn.
      - linters: [revive]
        text: "unused-parameter"

run:
  timeout: 5m
